name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest

      - name: Build & push web-client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web-client:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web-client:latest

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: COOKIE_SECRET,POSTGRES_PASSWORD,API_IMAGE,WEB_IMAGE,WEB_CLIENT_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd /opt/trener
            export API_IMAGE WEB_IMAGE WEB_CLIENT_IMAGE
            # Логин в GHCR: образы приватные, серверу нужна авторизация для pull.
            # GITHUB_TOKEN действует только во время этого прогона воркфлоу.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose pull
            docker compose run --rm api node apps/api/dist/migrate.js
            docker compose up -d
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/api/health | grep -q '"ok":true'; then
                echo "healthcheck ok"
                exit 0
              fi
              echo "waiting for api... ($i)"
              sleep 2
            done
            echo "healthcheck failed"
            exit 1
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          API_IMAGE: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          WEB_IMAGE: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          WEB_CLIENT_IMAGE: ghcr.io/${{ github.repository }}/web-client:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
