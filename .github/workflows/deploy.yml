name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # github.repository может содержать заглавные буквы (Kopilka-main/...),
      # а имена образов в GHCR обязаны быть строчными — приводим к lower-case.
      - name: Compute lowercase image base
        id: img
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}/api:${{ github.sha }}
            ${{ steps.img.outputs.base }}/api:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}/web:${{ github.sha }}
            ${{ steps.img.outputs.base }}/web:latest

      - name: Build & push web-client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-client/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.base }}/web-client:${{ github.sha }}
            ${{ steps.img.outputs.base }}/web-client:latest

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: COOKIE_SECRET,POSTGRES_PASSWORD,API_IMAGE,WEB_IMAGE,WEB_CLIENT_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd /opt/trener
            export API_IMAGE WEB_IMAGE WEB_CLIENT_IMAGE

            # Образы работающей версии — чтобы вернуться к ней, если новая не
            # взлетит. Пусто при самом первом деплое (откатываться некуда).
            prev_image() {
              cid=$(docker compose ps -q "$1" 2>/dev/null || true)
              [ -n "$cid" ] && docker inspect --format='{{.Config.Image}}' "$cid" 2>/dev/null || true
            }
            PREV_API=$(prev_image api)
            PREV_WEB=$(prev_image nginx)
            PREV_WEB_CLIENT=$(prev_image web-client)
            echo "предыдущие образы: api=$PREV_API web=$PREV_WEB web-client=$PREV_WEB_CLIENT"

            # Логин в GHCR: образы приватные, серверу нужна авторизация для pull.
            # GITHUB_TOKEN действует только во время этого прогона воркфлоу.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$(echo "$GHCR_USER" | tr '[:upper:]' '[:lower:]')" --password-stdin
            docker compose pull

            # Миграции ДО подъёма новой версии: если упадут, set -e прервёт деплой
            # и в проде останется работать прежняя версия.
            docker compose run --rm api node apps/api/dist/migrate.js

            docker compose up -d

            # Проверяем readiness (ходит в БД), а не просто liveness: «процесс
            # поднялся» ещё не значит «сервис может обслуживать запросы».
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/api/health/ready | grep -q '"ok":true'; then
                echo "деплой успешен: сервис готов"
                exit 0
              fi
              echo "ждём готовности api... ($i)"
              sleep 2
            done

            # ВНИМАНИЕ: откат возвращает КОД, но не откатывает уже применённую
            # миграцию — старый код встретит новую схему. Поэтому миграции должны
            # быть обратно совместимыми (expand/contract: сначала добавляем, код
            # переезжает, удаляем лишь в следующем релизе).
            echo "СЕРВИС НЕ ПОДНЯЛСЯ — откатываюсь на предыдущие образы"
            if [ -n "$PREV_API" ]; then
              API_IMAGE="$PREV_API" \
              WEB_IMAGE="${PREV_WEB:-$WEB_IMAGE}" \
              WEB_CLIENT_IMAGE="${PREV_WEB_CLIENT:-$WEB_CLIENT_IMAGE}" \
                docker compose up -d
              for i in $(seq 1 30); do
                if curl -fsS http://localhost:8080/api/health/ready | grep -q '"ok":true'; then
                  echo "откат выполнен: прежняя версия снова обслуживает"
                  break
                fi
                sleep 2
              done
            else
              echo "откат невозможен: предыдущая версия не найдена (первый деплой)"
            fi
            # Деплой всё равно считаем провальным — чтобы CI горел и это заметили.
            exit 1
        env:
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          API_IMAGE: ${{ steps.img.outputs.base }}/api:${{ github.sha }}
          WEB_IMAGE: ${{ steps.img.outputs.base }}/web:${{ github.sha }}
          WEB_CLIENT_IMAGE: ${{ steps.img.outputs.base }}/web-client:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
