events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }

    # App Links (Android): подтверждение связи app.fitbond.ru ↔ приложение тренера
    # (ru.fitbond.trener_trainer), чтобы родная камера открывала QR-ссылку /link/*
    # в приложении, а не в браузере. Отдаётся JSON без редиректов и авторизации.
    # Отпечаток — SHA-256 release-сертификата подписи APK.
    location = /.well-known/assetlinks.json {
      default_type application/json;
      return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ru.fitbond.trener_trainer","sha256_cert_fingerprints":["5B:BC:EC:C8:E8:5F:D0:C4:F2:2E:4C:00:AF:20:71:C9:D8:65:35:75:AD:7A:45:4D:A5:07:50:79:28:74:4D:EC","33:9F:37:47:B1:6D:47:F6:6E:68:09:82:64:44:8D:D0:12:39:B5:56:C8:79:33:50:1B:E2:AB:8C:88:1F:6C:C7"]}}]';
    }

    # Universal Links (iOS): связь app.fitbond.ru ↔ приложение тренера
    # (Team ID J826P275V2, bundle ru.fitbond.trenerTrainer). Файл без расширения,
    # Content-Type application/json, без редиректов и авторизации.
    location = /.well-known/apple-app-site-association {
      default_type application/json;
      return 200 '{"applinks":{"apps":[],"details":[{"appID":"J826P275V2.ru.fitbond.trenerTrainer","paths":["/link/*"]}]}}';
    }

    # Публичные юридические страницы (политика конфиденциальности, удаление
    # аккаунта) отдаёт api БЕЗ авторизации. Проксируем их в api точечно — иначе
    # их перехватывает SPA (location / ниже) и редиректит на вход, из-за чего
    # Google Play считал политику «требующей входа в аккаунт».
    location = /privacy { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /privacy.html { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /account-deletion { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /delete-account { proxy_pass http://api:3001; proxy_set_header Host $host; }

    # Хешированные ассеты Vite (имя содержит хэш) — кэшируем надолго.
    location /assets/ {
      root /usr/share/nginx/html;
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA: index.html НЕ кэшируем — иначе браузер тянет старый бандл после деплоя.
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires -1;
    }
  }
}
