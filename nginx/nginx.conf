events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }

    # App Links (Android): подтверждение связи app.fitbond.ru ↔ приложение тренера
    # (ru.fitbond.trener_trainer), чтобы родная камера открывала QR-ссылку /link/*
    # в приложении, а не в браузере. Отдаётся JSON без редиректов и авторизации.
    # Отпечаток — SHA-256 release-сертификата подписи APK.
    location = /.well-known/assetlinks.json {
      default_type application/json;
      return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"ru.fitbond.trener_trainer","sha256_cert_fingerprints":["5B:BC:EC:C8:E8:5F:D0:C4:F2:2E:4C:00:AF:20:71:C9:D8:65:35:75:AD:7A:45:4D:A5:07:50:79:28:74:4D:EC"]}}]';
    }

    # Хешированные ассеты Vite (имя содержит хэш) — кэшируем надолго.
    location /assets/ {
      root /usr/share/nginx/html;
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA: index.html НЕ кэшируем — иначе браузер тянет старый бандл после деплоя.
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires -1;
    }
  }
}
