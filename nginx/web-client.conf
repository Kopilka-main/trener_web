events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Публичные юридические страницы (политика конфиденциальности, удаление
    # аккаунта) отдаёт api БЕЗ авторизации. Проксируем точечно — иначе их
    # перехватывает SPA (location / ниже) и редиректит на вход, из-за чего
    # Google Play считал политику «требующей входа в аккаунт».
    location = /privacy { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /privacy.html { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /account-deletion { proxy_pass http://api:3001; proxy_set_header Host $host; }
    location = /delete-account { proxy_pass http://api:3001; proxy_set_header Host $host; }

    location /assets/ {
      root /usr/share/nginx/html;
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires -1;
    }
  }
}
