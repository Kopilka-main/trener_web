# Codemagic CI — сборка iOS (IPA) и загрузка в TestFlight без Mac.
#
# Перед первым запуском в Codemagic нужно:
#   1. Подключить этот Git-репозиторий.
#   2. Teams → Integrations → App Store Connect → добавить API-ключ
#      (Issuer ID + Key ID + файл .p8) и назвать интеграцию ИМЕННО:  FitBond ASC
#      (или поменяй имя в строках `app_store_connect:` ниже на своё).
#   3. Запустить нужный workflow (trainer-ios / client-ios).
#
# Версия берётся из pubspec.yaml (version: 1.0.3+4). Перед каждой новой загрузкой
# поднимай build-number в pubspec (как для Android), иначе App Store отклонит.
#
# Push-уведомления: App ID с Push capability + APNs-ключ в Firebase +
# GoogleService-Info.plist и entitlements (уже в проекте).

workflows:
  trainer-ios:
    name: FitBond Тренер — iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile/apps/trainer
    integrations:
      app_store_connect: FitBond ASC
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ru.fitbond.trenerTrainer
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Подпись (применить профили от Codemagic)
        script: xcode-project use-profiles
      - name: Сборка IPA (поды flutter поставит сам, Podfile сгенерится)
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  client-ios:
    name: FitBond Клиент — iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile/apps/client
    integrations:
      app_store_connect: FitBond ASC
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ru.fitbond.trenerClient
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Подпись (применить профили от Codemagic)
        script: xcode-project use-profiles
      - name: Сборка IPA (поды flutter поставит сам, Podfile сгенерится)
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
