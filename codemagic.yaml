# Codemagic CI — сборка iOS (IPA) и загрузка в TestFlight без Mac.
#
# Перед первым запуском в Codemagic нужно:
#   1. Подключить этот Git-репозиторий.
#   2. Teams → Integrations → App Store Connect → добавить API-ключ
#      (Issuer ID + Key ID + файл .p8) и назвать интеграцию ИМЕННО:  FitBond ASC
#      (или поменяй имя в строках `app_store_connect:` ниже на своё).
#   3. Запустить нужный workflow (trainer-ios / client-ios).
#
# Подпись: первая сборка САМА создаёт distribution-сертификат и provisioning
# profile через App Store Connect API (app-store-connect fetch-signing-files
# --create), поэтому заранее в Apple ничего создавать не нужно — только App ID
# с включённым Push (уже сделано).
#
# Версия берётся из pubspec.yaml. Перед каждой новой загрузкой поднимай
# build-number в pubspec (как для Android), иначе App Store отклонит.

workflows:
  trainer-ios:
    name: FitBond Тренер — iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile/apps/trainer
    integrations:
      app_store_connect: FitBond ASC
    environment:
      groups:
        - signing
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: 'ru.fitbond.trenerTrainer'
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Инициализировать keychain
        script: keychain initialize
      - name: Создать/получить сертификат и профиль
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Добавить сертификаты в keychain
        script: keychain add-certificates
      - name: Применить профили к проекту
        script: xcode-project use-profiles
      - name: Сборка IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  client-ios:
    name: FitBond Клиент — iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile/apps/client
    integrations:
      app_store_connect: FitBond ASC
    environment:
      groups:
        - signing
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: 'ru.fitbond.trenerClient'
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Инициализировать keychain
        script: keychain initialize
      - name: Создать/получить сертификат и профиль
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Добавить сертификаты в keychain
        script: keychain add-certificates
      - name: Применить профили к проекту
        script: xcode-project use-profiles
      - name: Сборка IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
