services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: trener
    # Только localhost: БД не должна торчать в интернет. Сервисы ходят к ней
    # по внутренней сети Docker (postgres:5432), внешний порт нужен лишь для
    # локального админ-доступа на самом сервере.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-trener-api:local}
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/trener
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET обязателен}
      # Web Push (VAPID). Без ключей push мягко отключён. Берутся из /opt/trener/.env
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@fitbond.ru}
      # Папка глобального медиа каталога упражнений (картинки/видео).
      CATALOG_MEDIA_DIR: /data/catalog
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - uploads:/data/uploads
      - catalog:/data/catalog

  nginx:
    image: ${WEB_IMAGE:-trener-web:local}
    build: { context: ., dockerfile: apps/web/Dockerfile }
    # Порт открыт только на localhost: для healthcheck деплоя и отладки.
    # Публичный доступ — через caddy (TLS), не напрямую.
    ports: ['127.0.0.1:8080:80']
    depends_on: [api]

  web-client:
    image: ${WEB_CLIENT_IMAGE:-trener-web-client:local}
    build: { context: ., dockerfile: apps/web-client/Dockerfile }
    ports: ['127.0.0.1:8081:80']
    depends_on: [api]

  # TLS-терминация + маршрутизация по поддоменам (app./my.fitbond.ru).
  # Сертификаты Let's Encrypt — автоматически (нужны порты 80/443 и делегированный домен).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ['80:80', '443:443']
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@fitbond.ru}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [nginx, web-client]
    # default — для nginx/web-client Тренера; proxy — общая сеть, через неё Caddy
    # достаёт web других стеков (мессенджер: messenger-web).
    networks:
      default: {}
      proxy: {}

  backup:
    image: postgres:16
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Сколько суток хранить бэкапы (старше — удаляются). По умолчанию 7.
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      # Бэкапы на основном диске (named volume). Когда загрузки вырастут — можно
      # подключить отдельный HDD и заменить на bind-mount /mnt/backups:/backups.
      - backups:/backups
      - uploads:/data/uploads:ro
      - catalog:/data/catalog:ro
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          echo "[backup] dump $$ts"
          pg_dump -h postgres -U postgres -d trener -F c -f "/backups/db-$$ts.dump" \
            && tar czf "/backups/uploads-$$ts.tar.gz" -C /data uploads \
            && tar czf "/backups/catalog-$$ts.tar.gz" -C /data catalog \
            && echo "[backup] ok $$ts" \
            || echo "[backup] FAILED $$ts"
          # Ротация: удаляем дампы и архивы старше BACKUP_RETENTION_DAYS суток.
          find /backups -name 'db-*.dump' -mtime +$$BACKUP_RETENTION_DAYS -delete
          find /backups -name 'uploads-*.tar.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete
          find /backups -name 'catalog-*.tar.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete
          sleep 86400
        done

volumes:
  pgdata:
  uploads:
  catalog:
  backups:
  caddy_data:
  caddy_config:

networks:
  # Общая сеть для маршрутизации Caddy на сторонние стеки (мессенджер и т.п.).
  # Создаётся один раз вручную: docker network create proxy
  proxy:
    external: true
