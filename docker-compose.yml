services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: trener
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/trener
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET обязателен}
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - uploads:/data/uploads

  nginx:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ['8080:80']
    depends_on: [api]

  backup:
    image: postgres:16
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - backups:/backups
      - uploads:/data/uploads:ro
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          echo "[backup] dump $$ts"
          pg_dump -h postgres -U postgres -d trener -F c -f "/backups/db-$$ts.dump" \
            && tar czf "/backups/uploads-$$ts.tar.gz" -C /data uploads \
            && echo "[backup] ok $$ts" \
            || echo "[backup] FAILED $$ts"
          sleep 86400
        done

volumes:
  pgdata:
  uploads:
  backups:
