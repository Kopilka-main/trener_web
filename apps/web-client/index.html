<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f5f4" />
    <!-- Ранняя установка темы из localStorage (до отрисовки — без мигания). -->
    <script>
      try {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#0b0c10');
        }
      } catch (e) {}
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- iOS Safari: гасим зум по двойному тапу и авто-увеличение текста; пинч/фокус-зум — через viewport выше. -->
    <style>
      html {
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bowlby+One&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Мой тренер</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
