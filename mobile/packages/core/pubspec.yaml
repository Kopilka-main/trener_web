name: core
description: 'Общий слой мобильных приложений Trener: модели, API-клиент, авторизация, тема, пуши.'
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2
  flutter: '>=1.17.0'

dependencies:
  flutter:
    sdk: flutter
  # Сеть
  dio: ^5.7.0
  # Состояние
  flutter_riverpod: ^2.6.1
  # Роутинг
  go_router: ^14.6.2
  # Безопасное хранение токена сессии
  flutter_secure_storage: ^9.2.4
  # Пуши (FCM)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  # Локальный кэш данных каталога + офлайн-медиа упражнений
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  video_player: ^2.9.2
  # OAuth-вход через провайдера (VK/Яндекс) в WebView
  webview_flutter: ^4.10.0
  in_app_review: ^2.0.12
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  # Детект сетевого интерфейса для NetworkStatus
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Фирменные шрифты бандлятся в ассеты (грузятся синхронно при старте) — без
  # рантайм-загрузки Google Fonts, поэтому нет мерцания/задержки на первом запуске.
  # SpaceGrotesk и JetBrainsMono — вариативные (ось wght), Flutter сам маппит fontWeight.
  # В коде семейства указываются как 'packages/core/<Family>'.
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    - family: BowlbyOne
      fonts:
        - asset: assets/fonts/BowlbyOne-Regular.ttf
